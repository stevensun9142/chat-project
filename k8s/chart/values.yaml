postgres:
  image: postgres:16
  password: chat_secret
  user: chat
  database: chat_db
  storage: 1Gi
  nodePort: 30432

cassandra:
  image: cassandra:4.1
  clusterName: chat_cluster
  dc: dc1
  storage: 2Gi
  nodePort: 30042

gateway:
  image: chat-gateway:latest
  replicas: 1
  port: 8001
  grpcPort: 9001
  nodePort: 30801

messageWorker:
  image: chat-message-worker:latest
  replicas: 1

router:
  image: chat-router:latest
  replicas: 1

api:
  image: chat-api:latest
  replicas: 1
  port: 8000
  serviceType: NodePort
  nodePort: 30800
  corsOrigins: '["*"]'

frontend:
  image: chat-frontend:latest
  replicas: 1

ingress:
  enabled: false

imagePullPolicy: Never

redis:
  image: redis:7.2
  replicas: 1
  storage: 512Mi
  nodePort: 30379

redisCache:
  image: redis:7.2
  nodePort: 30380

redisRatelimit:
  image: redis:7.2
  nodePort: 30381

jwt:
  secret: change-me-in-prod

clickhouse:
  image: clickhouse/clickhouse-server:24-alpine
  storage: 5Gi
  nodePort: 30123

kafka:
  image: apache/kafka:3.7.1
  replicas: 3
  clusterId: MkU3OEVBNTcwNTJENDM2Qk
  heapOpts: "-Xmx256m -Xms256m"
  storage: 1Gi
  nodePorts:
    - 30092
    - 30093
    - 30094
  topics:
    - name: chat.messages
      partitions: 6
      replicationFactor: 3
    - name: chat.delivery
      partitions: 6
      replicationFactor: 3
    - name: presence.events
      partitions: 3
      replicationFactor: 3
