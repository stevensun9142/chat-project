apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
{{ include "chat.imagePullSecrets" . }}
      containers:
        - name: router
          image: {{ .Values.router.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy | default "Never" }}
          env:
            - name: KAFKA_BROKERS
              value: {{ include "chat.kafkaBrokers" $ | quote }}
            - name: REDIS_ADDRS
              value: {{ include "chat.redisPresenceAddrs" $ | quote }}
            - name: PG_DSN
              value: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
            - name: GATEWAY_ADDRS
              value: "{{- $grpcPort := .Values.gateway.grpcPort -}}{{- $replicas := int .Values.gateway.replicas -}}{{- range $i := until $replicas -}}{{- if $i }},{{ end -}}gateway-{{ $i }}=gateway-{{ $i }}.gateway:{{ $grpcPort }}{{- end -}}"
