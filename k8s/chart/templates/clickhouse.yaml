apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
data:
  low-memory.xml: |
    <clickhouse>
        <max_server_memory_usage_to_ram_ratio>0.75</max_server_memory_usage_to_ram_ratio>
        <max_concurrent_queries>8</max_concurrent_queries>
        <max_connections>64</max_connections>
        <mark_cache_size>268435456</mark_cache_size>
        <uncompressed_cache_size>16777216</uncompressed_cache_size>
        <mysql_port remove="1"/>
        <postgresql_port remove="1"/>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
spec:
  type: NodePort
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: {{ .Values.clickhouse.nodePort }}
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
{{- include "chat.imagePullSecrets" . }}
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8123
            - containerPort: 9000
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/low-memory.xml
              subPath: low-memory.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage }}
