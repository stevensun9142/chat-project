apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      nodePort: {{ .Values.gateway.nodePort }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gateway
spec:
  serviceName: gateway
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.gateway.port }}
            - containerPort: {{ .Values.gateway.grpcPort }}
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: GRPC_PORT
              value: {{ .Values.gateway.grpcPort | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: KAFKA_BROKERS
              value: "kafka-1-0.kafka-headless:9092,kafka-2-0.kafka-headless:9092,kafka-3-0.kafka-headless:9092"
          readinessProbe:
            tcpSocket:
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
