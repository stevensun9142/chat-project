apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: {{ .Values.api.serviceType | default "ClusterIP" }}
  selector:
    app: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      {{- if .Values.api.nodePort }}
      nodePort: {{ .Values.api.nodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
{{ include "chat.imagePullSecrets" . }}
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy | default "Never" }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: PG_HOST
              value: "postgres"
            - name: PG_PORT
              value: "5432"
            - name: PG_USER
              value: {{ .Values.postgres.user | quote }}
            - name: PG_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: PG_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: CASS_HOSTS
              value: '["cassandra"]'
            - name: CASS_PORT
              value: "9042"
            - name: CASS_KEYSPACE
              value: "chat"
            - name: REDIS_CACHE_URL
              value: "redis://redis-cache:6379/0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | default "[\"*\"]" | quote }}
          readinessProbe:
            httpGet:
              path: /docs
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
