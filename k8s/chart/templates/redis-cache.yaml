apiVersion: v1
kind: Service
metadata:
  name: redis-cache
spec:
  type: NodePort
  selector:
    app: redis-cache
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: {{ .Values.redisCache.nodePort }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
spec:
  serviceName: redis-cache
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
        - name: redis-cache
          image: {{ .Values.redisCache.image }}
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
