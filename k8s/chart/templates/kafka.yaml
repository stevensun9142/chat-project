{{- /* Headless service for inter-broker communication */ -}}
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9091
      targetPort: 9091
{{- range $i := until (int $.Values.kafka.replicas) }}
{{- $nodeId := add $i 1 }}
{{- $externalPort := add 19092 $i }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-{{ $nodeId }}-external
spec:
  type: NodePort
  selector:
    app: kafka
    kafka-broker-id: {{ $nodeId | quote }}
  ports:
    - port: {{ $externalPort }}
      targetPort: {{ $externalPort }}
      nodePort: {{ index $.Values.kafka.nodePorts $i }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-{{ $nodeId }}
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
      kafka-broker-id: {{ $nodeId | quote }}
  template:
    metadata:
      labels:
        app: kafka
        kafka-broker-id: {{ $nodeId | quote }}
    spec:
      containers:
        - name: kafka
          image: {{ $.Values.kafka.image }}
          ports:
            - containerPort: 9092
              name: internal
            - containerPort: 9091
              name: controller
            - containerPort: {{ $externalPort }}
              name: external
          env:
            - name: KAFKA_NODE_ID
              value: {{ $nodeId | quote }}
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "{{- range $j := until (int $.Values.kafka.replicas) }}{{- if $j }},{{ end }}{{ add $j 1 }}@kafka-{{ add $j 1 }}-0.kafka-headless:9091{{- end }}"
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9091,EXTERNAL://:{{ $externalPort }}
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka-{{ $nodeId }}-0.kafka-headless:9092,EXTERNAL://localhost:{{ add 9092 (sub $nodeId 1) }}
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: CLUSTER_ID
              value: {{ $.Values.kafka.clusterId }}
            - name: KAFKA_HEAP_OPTS
              value: {{ $.Values.kafka.heapOpts | quote }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: {{ min $.Values.kafka.replicas 3 | quote }}
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: {{ min $.Values.kafka.replicas 3 | quote }}
          volumeMounts:
            - name: data
              mountPath: /tmp/kraft-combined-logs
          readinessProbe:
            exec:
              command: ["/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $.Values.kafka.storage }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topics
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: {{ .Values.kafka.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Waiting for Kafka brokers..."
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1-0.kafka-headless:9092 --list > /dev/null 2>&1; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              {{- range .Values.kafka.topics }}
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1-0.kafka-headless:9092 \
                --create --if-not-exists \
                --topic {{ .name }} \
                --partitions {{ .partitions }} \
                --replication-factor {{ .replicationFactor }}
              {{- end }}
              echo "Topics created:"
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1-0.kafka-headless:9092 --list
