apiVersion: v1
kind: Service
metadata:
  name: redis-ratelimit
spec:
  type: NodePort
  selector:
    app: redis-ratelimit
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: {{ .Values.redisRatelimit.nodePort }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ratelimit
spec:
  serviceName: redis-ratelimit
  replicas: 1
  selector:
    matchLabels:
      app: redis-ratelimit
  template:
    metadata:
      labels:
        app: redis-ratelimit
    spec:
      containers:
        - name: redis-ratelimit
          image: {{ .Values.redisRatelimit.image }}
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "noeviction"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
