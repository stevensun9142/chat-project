# values-cloud.yaml — Oracle Cloud Free Tier (ARM64 k3s) overlay
# Usage: helm install chat k8s/chart/ -n chat --create-namespace -f k8s/values-cloud.yaml
#
# Region: us-ashburn-1 (iad), Tenancy: idgcyiznbhvc

imagePullPolicy: IfNotPresent
imagePullSecret: ocir-secret

# --- Container images (OCIR) ---
gateway:
  image: iad.ocir.io/idgcyiznbhvc/chat-gateway:latest
  replicas: 1

messageWorker:
  image: iad.ocir.io/idgcyiznbhvc/chat-message-worker:latest
  replicas: 1

router:
  image: iad.ocir.io/idgcyiznbhvc/chat-router:latest
  replicas: 1

api:
  image: iad.ocir.io/idgcyiznbhvc/chat-api:latest
  replicas: 1
  port: 8000
  serviceType: ClusterIP
  nodePort: null
  corsOrigins: '["*"]'

frontend:
  image: iad.ocir.io/idgcyiznbhvc/chat-frontend:latest
  replicas: 1

# --- Ingress (nginx, least-connections for WebSocket) ---
ingress:
  enabled: true
  ingressClassName: nginx
  host: bandit-chat.duckdns.org
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

# --- Secrets (override in deployment, NOT in git) ---
jwt:
  secret: CHANGE-ME-IN-PROD

# --- Single Kafka broker (saves ~2GB RAM) ---
kafka:
  image: apache/kafka:3.7.1
  replicas: 1
  clusterId: MkU3OEVBNTcwNTJENDM2Qk
  heapOpts: "-Xmx256m -Xms256m"
  storage: 2Gi
  nodePorts:
    - 30092
  topics:
    - name: chat.messages
      partitions: 3
      replicationFactor: 1
    - name: chat.delivery
      partitions: 3
      replicationFactor: 1
    - name: presence.events
      partitions: 3
      replicationFactor: 1

# --- Smaller storage for free tier ---
postgres:
  image: postgres:16
  password: chat_secret
  user: chat
  database: chat_db
  storage: 5Gi
  nodePort: 30432

cassandra:
  image: cassandra:4.1
  clusterName: chat_cluster
  dc: dc1
  storage: 5Gi
  nodePort: 30042

redis:
  image: redis:7.2
  storage: 256Mi
  nodePort: 30379

redisCache:
  image: redis:7.2
  nodePort: 30380

redisRatelimit:
  image: redis:7.2
  nodePort: 30381
